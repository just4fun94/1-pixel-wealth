<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 30 160" width="30" height="160">
  <!-- Long tick (full 30px) aligned to right border -->
  <rect x="0"  y="0"   width="30" height="1.185" fill="black"/>
  <!-- Medium ticks (20px) - right-aligned: start at x=10 -->
  <rect x="10" y="40"  width="20" height="1.185" fill="black"/>
  <rect x="10" y="80"  width="20" height="1.185" fill="black"/>
  <rect x="10" y="120" width="20" height="1.185" fill="black"/>
  <!-- Short ticks (10px) - right-aligned: start at x=20 -->
  <rect x="20" y="10"  width="10" height="1.185" fill="black"/>
  <rect x="20" y="20"  width="10" height="1.185" fill="black"/>
  <rect x="20" y="30"  width="10" height="1.185" fill="black"/>
  <rect x="20" y="50"  width="10" height="1.185" fill="black"/>
  <rect x="20" y="60"  width="10" height="1.185" fill="black"/>
  <rect x="20" y="70"  width="10" height="1.185" fill="black"/>
  <rect x="20" y="90"  width="10" height="1.185" fill="black"/>
  <rect x="20" y="100" width="10" height="1.185" fill="black"/>
  <rect x="20" y="110" width="10" height="1.185" fill="black"/>
  <rect x="20" y="130" width="10" height="1.185" fill="black"/>
  <rect x="20" y="140" width="10" height="1.185" fill="black"/>
  <rect x="20" y="150" width="10" height="1.185" fill="black"/>
</svg>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <script async src="https://www.googletagmanager.com/gtag/js?id=UA-2320532-12"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'UA-2320532-12');
  </script>

  <title>Wealth, shown to scale</title>
  <meta name="description" content="Global wealth inequality visualized at true scale." />

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Wealth, shown to scale">
  <meta name="twitter:description" content="Global wealth inequality visualized at true scale.">
  <meta name="twitter:image" content="https://mkorostoff.github.io/1-pixel-wealth/img/off-the-chart.png">

  <meta property="og:title" content="Wealth, shown to scale" />
  <meta property="og:type" content="website" />
  <meta property="og:description" content="Global wealth inequality visualized at true scale." />
  <meta property="og:image" content="https://mkorostoff.github.io/1-pixel-wealth/img/off-the-chart.png" />

  <link rel="stylesheet" type="text/css" href="main.css?version=2.0">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1" />
</head>
<body>
<noscript><p style="text-align:center;padding:2em;font-family:sans-serif">Please enable JavaScript to view this page.</p></noscript>

  <div class="wealth-wrapper-outer"><!--i18n-start-->
    <div class="wealth-row wealth-row-one">
      <div class="title-screen">
        <h1 class="i18n-wealth-shown-to">Wealth shown to scale</h1>
        <div class="scroll-this-way i18n-scroll">scroll</div>
      </div>

      <!-- Calibration bars -->
      <div class="wealth-wrapper">
        <h2 class="wealth-title i18n-USD1000">$1,000</h2>
        <div class="wealth one-thousand"></div>
        <div class="arrow">
          <svg viewBox="0 0 70 14" width="70" height="14" aria-hidden="true">
            <path d="M 69.25 5.58 L 69.25 8.72 L 14.82 8.72 L 14.82 13.4 L 0.2 7.15 L 14.82 0.9 L 14.82 5.58 Z" fill="#ccc"/>
          </svg>
        </div>
      </div>

      <div class="wealth-wrapper median">
        <h2 class="wealth-title i18n-USD63179-median">$63,179 (Median US household income)</h2>
        <div class="wealth"></div>
      </div>

      <div class="wealth-wrapper million">
        <h2 class="wealth-title i18n-USD1-million">$1 million</h2>
        <div class="wealth"></div>
      </div>

      <div class="wealth-wrapper billion">
        <div class="wealth">
          <h2 class="wealth-title i18n-USD1-billion">$1 billion</h2>
        </div>
      </div>

      <!-- Richest person bar — content injected by main.js from story.json -->
      <div name="richest" class="wealth-wrapper richest">
        <div id="richest" class="wealth ruler">
          <div class="wealth-header">
            <h2 class="wealth-title" id="richest-title">Loading…</h2>
            <div class="counter" id="richest-counter"></div>
          </div>
          <div class="key">
            <span class="scale-label">—</span>
          </div>
          <div id="richest-comparisons"></div>
        </div>
      </div>

      <!-- All-billionaires bar — segmented, content injected -->
      <div id="allBillionaires-wrapper" class="wealth-wrapper all-billionaires">
        <div id="allBillionaires" class="wealth ruler">
          <div class="wealth-header">
            <h2 class="wealth-title" id="allBillionaires-title">Loading…</h2>
            <div class="counter" id="allBillionaires-counter"></div>
          </div>
          <div class="key">
            <span class="scale-label">—</span>
          </div>
          <div id="allBillionaires-comparisons"></div>
        </div>
      </div>

    </div>
  </div>
<!--i18n-end-->

<!-- Death ticker overlay -->
<div id="death-ticker" class="death-ticker" hidden>
  <div class="death-ticker-inner">
    <span class="death-ticker-label">Preventable deaths since you opened this page:</span>
    <div id="death-ticker-counts"></div>
  </div>
</div>

<script type="text/javascript" src="main.js?version=2.0" defer></script>
<div id="data-source" style="text-align:center;padding:8px;font-size:12px;color:#666;"></div>
</body>
</html>
